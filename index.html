<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>HSE Monitoring Proyek</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Google Fonts - Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    body {
      background: linear-gradient(135deg, #e8edf5 0%, #d4ddee 100%);
      margin: 0;
      padding: 0;
    }
    .app-container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
      box-shadow: 0 0 40px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      border-radius: 0;
    }
    @media (min-width: 576px) {
      .app-container {
        border-radius: 1.8rem;
        margin: 1.2rem auto;
        min-height: calc(100vh - 2.4rem);
      }
    }
    .header {
      background: linear-gradient(135deg, #0d2b4b 0%, #1a4a7a 50%, #2a6ab0 100%);
      color: white;
      padding: 1.8rem 1.5rem 1.5rem;
      border-top-left-radius: 0;
      border-top-right-radius: 0;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: -20px;
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.03);
      border-radius: 50%;
    }
    @media (min-width: 576px) {
      .header {
        border-top-left-radius: 1.8rem;
        border-top-right-radius: 1.8rem;
      }
    }
    .header-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      color: #6ab0ff;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
      position: relative;
      z-index: 1;
    }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin: 0;
      position: relative;
      z-index: 1;
    }
    .header p {
      margin: 0.3rem 0 0;
      opacity: 0.9;
      font-size: 0.95rem;
      font-weight: 500;
      position: relative;
      z-index: 1;
    }
    .form-section {
      padding: 1.8rem 1.4rem;
      flex: 1;
    }
    .form-label {
      font-weight: 600;
      color: #1a3a5a;
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: -0.1px;
    }
    .form-label i {
      color: #2a6ab0;
      font-size: 1rem;
    }
    .form-control, .form-select {
      border-radius: 0.8rem;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #d0dcec;
      background: #f8faff;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .form-control:focus, .form-select:focus {
      border-color: #2a6ab0;
      box-shadow: 0 0 0 0.2rem rgba(42,106,176,0.15);
      background: white;
    }
    .signature-section {
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
      padding: 1.2rem;
      background: #f5f8fc;
      border-radius: 1rem;
      border: 2px dashed #b8cce0;
    }
    .signature-title {
      font-weight: 700;
      color: #1a3a5a;
      font-size: 0.95rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .signature-pad-container {
      background: white;
      border: 1.5px solid #d0dcec;
      border-radius: 0.8rem;
      overflow: hidden;
      position: relative;
    }
    #signatureCanvas {
      width: 100%;
      height: 180px;
      cursor: crosshair;
      display: block;
      background: white;
    }
    .signature-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .btn-signature {
      flex: 1;
      border-radius: 0.6rem;
      font-weight: 600;
      padding: 0.5rem;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      transition: all 0.2s;
    }
    .btn-clear {
      background: #fff;
      border: 1.5px solid #e74c3c;
      color: #e74c3c;
    }
    .btn-clear:hover {
      background: #e74c3c;
      color: white;
    }
    .btn-confirm {
      background: #1a4a7a;
      border: 1.5px solid #1a4a7a;
      color: white;
    }
    .btn-confirm:hover {
      background: #0d2b4b;
    }
    .signature-status {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .signature-status.signed {
      color: #27ae60;
    }
    .signature-status.unsigned {
      color: #e67e22;
    }
    .btn-generate {
      background: linear-gradient(135deg, #2a6ab0 0%, #1a4a7a 100%);
      border: none;
      font-weight: 700;
      color: white;
      padding: 0.9rem;
      border-radius: 1rem;
      font-size: 1.1rem;
      letter-spacing: 0.2px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(42,106,176,0.35);
      width: 100%;
      margin-top: 0.8rem;
    }
    .btn-generate:hover:not(:disabled) {
      background: linear-gradient(135deg, #1a4a7a 0%, #0d2b4b 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(42,106,176,0.45);
    }
    .btn-generate:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-download-group {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.2rem;
    }
    .btn-download {
      flex: 1;
      border-radius: 0.9rem;
      font-weight: 600;
      padding: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      background: white;
      border: 2px solid #d0dcec;
      color: #1a3a5a;
      transition: all 0.2s ease;
      font-size: 0.9rem;
    }
    .btn-download:hover {
      background: #f0f5ff;
      border-color: #2a6ab0;
    }
    .btn-download i {
      font-size: 1.2rem;
    }
    .btn-download-pdf {
      color: #dc3545;
    }
    .btn-download-pdf:hover {
      background: #fff0f0;
      border-color: #dc3545;
    }
    .btn-download-png {
      color: #2a6ab0;
    }
    .btn-download-png:hover {
      background: #f0f5ff;
      border-color: #2a6ab0;
    }
    .footer-staff {
      background: #f0f5fc;
      padding: 0.9rem 1.4rem;
      font-size: 0.85rem;
      color: #1a3a5a;
      text-align: center;
      border-top: 1px solid #d0dcec;
      font-weight: 600;
      letter-spacing: -0.1px;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }
    @media (min-width: 576px) {
      .footer-staff {
        border-bottom-left-radius: 1.8rem;
        border-bottom-right-radius: 1.8rem;
      }
    }
    .preview-images {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 0.6rem;
    }
    .preview-images img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 0.7rem;
      border: 2px solid #d0dcec;
      transition: transform 0.2s;
    }
    .preview-images img:hover {
      transform: scale(1.05);
    }
    #reportCanvas {
      display: none;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <i class="bi bi-shield-shaded header-icon"></i>
    <h1>HSE Monitoring Proyek</h1>
    <p>Temuan & Ketidaksesuaian</p>
  </div>

  <div class="form-section">
    <form id="hseForm" novalidate>
      <!-- 1. Tanggal -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-calendar3"></i> Tanggal</label>
        <input type="date" class="form-control" id="tanggal" required>
      </div>
      <!-- 2. Waktu -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-clock"></i> Waktu</label>
        <input type="time" class="form-control" id="waktu" required>
      </div>
      <!-- 3. Lokasi -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-geo-alt-fill"></i> Lokasi</label>
        <input type="text" class="form-control" id="lokasi" placeholder="Area / plant / koordinat" required>
      </div>
      <!-- 4. Vendor/Kontraktor -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-building"></i> Vendor / Kontraktor</label>
        <input type="text" class="form-control" id="vendor" placeholder="Nama perusahaan" required>
      </div>
      <!-- 5. Aktivitas/Pekerjaan -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-tools"></i> Aktivitas / Pekerjaan</label>
        <input type="text" class="form-control" id="aktivitas" placeholder="Fabrikasi, pengelasan, dll." required>
      </div>
      <!-- 6. Peralatan/Mesin -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-gear-fill"></i> Peralatan / Mesin</label>
        <input type="text" class="form-control" id="peralatan" placeholder="Mesin las, gerinda, crane...">
      </div>
      <!-- 7. Kategori Temuan -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-exclamation-triangle-fill"></i> Kategori Temuan</label>
        <select class="form-select" id="kategori" required>
          <option value="" disabled selected>-- Pilih Kategori --</option>
          <option value="Unsafe Act">Unsafe Act (Tindakan Tidak Aman)</option>
          <option value="Unsafe Condition">Unsafe Condition (Kondisi Tidak Aman)</option>
          <option value="Environmental">Environmental (Lingkungan)</option>
          <option value="Equipment Failure">Equipment Failure (Kerusakan Alat)</option>
          <option value="Procedural">Procedural (Pelanggaran Prosedur)</option>
        </select>
      </div>
      <!-- 8. Deskripsi Temuan -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-card-text"></i> Deskripsi Temuan</label>
        <textarea class="form-control" id="deskripsi" rows="3" placeholder="Jelaskan temuan secara detail..." required></textarea>
      </div>
      <!-- 9. Rekomendasi Perbaikan -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-lightbulb-fill"></i> Rekomendasi Perbaikan</label>
        <textarea class="form-control" id="rekomendasi" rows="2" placeholder="Tindakan perbaikan yang disarankan..." required></textarea>
      </div>
      <!-- 10. Upload Dokumentasi (multiple) -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-camera-fill"></i> Upload Dokumentasi</label>
        <input type="file" class="form-control" id="dokumentasi" accept="image/*" multiple>
        <div class="preview-images" id="imagePreview"></div>
      </div>

      <!-- Digital Signature Section -->
      <div class="signature-section">
        <div class="signature-title">
          <i class="bi bi-pen-fill"></i> Tanda Tangan Digital
        </div>
        <div class="signature-pad-container">
          <canvas id="signatureCanvas"></canvas>
        </div>
        <div class="signature-actions">
          <button type="button" class="btn btn-signature btn-clear" id="clearSignature">
            <i class="bi bi-eraser-fill"></i> Hapus
          </button>
          <button type="button" class="btn btn-signature btn-confirm" id="confirmSignature">
            <i class="bi bi-check-circle-fill"></i> Konfirmasi TTD
          </button>
        </div>
        <div class="signature-status unsigned" id="signatureStatus">
          <i class="bi bi-exclamation-circle-fill"></i> 
          <span>Silakan tanda tangan di atas</span>
        </div>
      </div>

      <button type="button" class="btn btn-generate" id="generateBtn">
        <i class="bi bi-file-earmark-arrow-up me-2"></i> Generate Laporan
      </button>

      <div class="btn-download-group" id="downloadGroup" style="display: none;">
        <button class="btn btn-download btn-download-pdf" id="downloadPdf">
          <i class="bi bi-file-pdf-fill"></i> PDF
        </button>
        <button class="btn btn-download btn-download-png" id="downloadPng">
          <i class="bi bi-file-image-fill"></i> PNG
        </button>
      </div>
    </form>
  </div>

  <div class="footer-staff">
    <i class="bi bi-person-badge-fill"></i> HSE Staff: <strong>Gifary Setia Putra</strong>
  </div>
</div>

<!-- Hidden canvas untuk rendering laporan -->
<canvas id="reportCanvas" width="800" height="1000"></canvas>

<!-- Script libraries -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
</script>

<!-- Main App Module -->
<script type="module" src="js/app.js"></script>
</body>
</html>
